<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ping Logger</title>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <style>
            body {
                margin: 0;
                padding: 20px;
                font-family: Arial, sans-serif;
                text-align: center;
            }

            #addressesInput {
                width: 100%;
                padding: 10px;
                margin-bottom: 10px;
                font-size: 16px;
            }

            #controls {
                margin-bottom: 20px;
            }

            #chartContainer {
                width: 100%;
                max-width: 100%;
                height: 70vh;
            }

            canvas {
                width: 100% !important;
                height: 100% !important;
            }

            button {
                padding: 10px 15px;
                margin: 5px;
                font-size: 16px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <h2>Ping Statistics</h2>

        <input
            type="text"
            id="addressesInput"
            placeholder="Enter addresses separated by commas"
            value="google.com, amazon.com, facebook.com, 192.169.0.0"
        />

        <div id="controls">
            <button id="pingButton" onclick="togglePing()">Start Ping</button>
            <button onclick="downloadLog()">Download Log</button>
            <button onclick="triggerFileInput()">Load Log</button>
            <input
                type="file"
                id="fileInput"
                accept=".csv"
                onchange="loadLog(event)"
                style="display: none"
            />
        </div>
        <label for="intervalInput">Ping Interval (ms):</label>
        <input
            type="number"
            id="intervalInput"
            placeholder="100"
            value="100"
            min="10"
            step="10"
        />

        <div id="chartContainer">
            <canvas id="pingChart"></canvas>
        </div>

        <script>
            let addresses = [];
            let logData = [];
            let isPinging = false;
            let pingInterval;
            let abortController = new AbortController();

            const ctx = document.getElementById("pingChart").getContext("2d");
            const pingChart = new Chart(ctx, {
                type: "line",
                data: {
                    labels: [],
                    datasets: [],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { title: { display: true, text: "Time" } },
                        y: { title: { display: true, text: "Ping (ms)" } },
                    },
                },
            });

            function togglePing() {
                const pingButton = document.getElementById("pingButton");
                const intervalInput = document.getElementById("intervalInput");
                let interval = parseInt(intervalInput.value, 10) || 100;

                if (isPinging) {
                    clearInterval(pingInterval);
                    abortController.abort();
                    abortController = new AbortController();
                    isPinging = false;
                    pingButton.textContent = "Start Ping";
                } else {
                    addresses = document
                        .getElementById("addressesInput")
                        .value.split(",")
                        .map((addr) => addr.trim());
                    if (addresses.length === 0 || addresses[0] === "") {
                        alert("Please enter at least one address.");
                        return;
                    }

                    pingChart.data.datasets = addresses.map(
                        (address, index) => ({
                            label: address,
                            borderColor: ["red", "orange", "yellow", "green", "blue"][index % 5],
                            data: [],
                            fill: false,
                        })
                    );
                    pingChart.data.labels = [];
                    pingChart.update();

                    isPinging = true;
                    pingButton.textContent = "Stop Ping";

                    pingInterval = setInterval(updatePings, interval);
                }
            }

            async function updatePings() {
                if (!isPinging || addresses.length === 0) return;

                try {
                    const results = await Promise.all(
                        addresses.map((addr) => ping(addr))
                    );
                    if (!isPinging) return;

                    const timestamp = new Date().toLocaleTimeString();
                    results.forEach((time, index) => {
                        // Log the time, even if it failed (NaN for failure)
                        pingChart.data.datasets[index].data.push(time !== null ? time : NaN);
                    });

                    pingChart.data.labels.push(timestamp);
                    pingChart.update();

                    // Log the timestamp and ping results
                    logData.push([timestamp, ...results]);
                } catch (error) {
                    if (error.name !== "AbortError") {
                        console.error("Ping failed:", error);
                    }
                }
            }

            function ping(address) {
                return new Promise((resolve) => {
                    const start = performance.now();
                    fetch(`https://${address}`, {
                        mode: "no-cors",
                        signal: abortController.signal,
                    })
                        .then(() => {
                            const time = performance.now() - start;
                            resolve(time);
                        })
                        .catch(() => {
                            resolve(null); // No response within interval, resolve with null
                        });
                });
            }

            function downloadLog() {
                const csv = logData
                    .map((row) => row.join(","))
                    .join("\n");
                const blob = new Blob([csv], { type: "text/csv" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "ping_log.csv";
                link.click();
            }

            function triggerFileInput() {
                document.getElementById("fileInput").click();
            }

            function loadLog(event) {
                const file = event.target.files[0];
                const reader = new FileReader();
                reader.onload = function (e) {
                    const content = e.target.result;
                    const rows = content.split("\n").map((row) => row.split(","));
                    logData = rows;
                    addresses = rows[0].slice(1);
                    alert("Log loaded!");
                };
                reader.readAsText(file);
            }
        </script>
    </body>
</html>
